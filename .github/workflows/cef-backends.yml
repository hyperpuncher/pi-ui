name: Build CEF backends

env:
    CEF_BACKEND_TAG: cef-150.0.11-laufey-0.5.0-pi-ui.1
    CEF_FULL_VERSION: 150.0.11+gb887805+chromium-150.0.7871.115
    CEF_VERSION: 150.0.11
    LAUFEY_VERSION: 0.5.0

on:
    workflow_dispatch:

jobs:
    build:
        name: Build ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-22.04
                      target: x86_64-unknown-linux-gnu
                    - os: ubuntu-22.04-arm
                      target: aarch64-unknown-linux-gnu
                    - os: macos-15-intel
                      target: x86_64-apple-darwin
                    - os: macos-14
                      target: aarch64-apple-darwin
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc

        steps:
            - uses: actions/checkout@v7

            - name: Clone Laufey
              shell: bash
              run: |
                  git clone \
                    --branch "v$LAUFEY_VERSION" \
                    --depth 1 \
                    https://github.com/littledivy/laufey.git \
                    "$RUNNER_TEMP/laufey"

            - name: Apply feature defaults
              shell: bash
              run: |
                  git -C "$RUNNER_TEMP/laufey" apply \
                    "$GITHUB_WORKSPACE/packaging/laufey/default-features.patch"

            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    cmake ninja-build pkg-config \
                    libx11-dev libxi-dev libglib2.0-dev libnss3-dev libnspr4-dev \
                    libatk1.0-dev libatk-bridge2.0-dev libcups2-dev libdrm-dev \
                    libgtk-3-dev libgbm-dev libasound2-dev libpango1.0-dev \
                    libcairo2-dev libxcomposite-dev libxdamage-dev libxrandr-dev \
                    libxkbcommon-dev libdbus-1-dev libxext-dev libxfixes-dev

            - name: Install macOS dependencies
              if: runner.os == 'macOS'
              run: brew install llvm ninja

            - name: Install Windows dependencies
              if: runner.os == 'Windows'
              run: choco install make ninja -y

            - uses: ilammy/msvc-dev-cmd@v1
              if: runner.os == 'Windows'

            - name: Cache CEF
              uses: actions/cache@v6
              with:
                  path: ${{ runner.temp }}/laufey/vendor/cef
                  key: laufey-${{ env.LAUFEY_VERSION }}-cef-${{ env.CEF_FULL_VERSION }}-${{ matrix.os }}-${{ runner.arch }}

            - name: Build Laufey against CEF 150
              shell: bash
              run: |
                  if [[ "${{ runner.os }}" == "Windows" ]]; then
                    export TAR_OPTIONS=--force-local
                  fi
                  make -C "$RUNNER_TEMP/laufey" cef \
                    CEF_VERSION="$CEF_VERSION" \
                    CEF_FULL_VERSION="$CEF_FULL_VERSION"

            - name: Verify Chromium version
              if: runner.os == 'Linux'
              shell: bash
              run: |
                  strings "$RUNNER_TEMP/laufey/cef/build/Release/libcef.so" \
                    | grep -m1 'Chrome/150\.0\.7871\.115'

            - name: Package backend
              shell: bash
              run: |
                  cd "$RUNNER_TEMP/laufey"
                  if [[ "${{ runner.os }}" == "macOS" ]]; then
                    tar czf "$GITHUB_WORKSPACE/laufey-cef-${{ matrix.target }}.tar.gz" \
                      -C cef/build/Release laufey.app
                  elif [[ "${{ runner.os }}" == "Windows" ]]; then
                    cd cef/build/Release
                    7z a "$GITHUB_WORKSPACE/laufey-cef-${{ matrix.target }}.zip" '*'
                  else
                    strip --strip-unneeded cef/build/Release/libcef.so
                    tar czf "$GITHUB_WORKSPACE/laufey-cef-${{ matrix.target }}.tar.gz" \
                      -C cef/build/Release .
                  fi

            - uses: actions/upload-artifact@v7
              with:
                  name: laufey-cef-${{ matrix.target }}
                  path: laufey-cef-${{ matrix.target }}.*

    publish:
        name: Publish reusable backends
        needs: build
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - uses: actions/download-artifact@v8
              with:
                  path: artifacts
                  merge-multiple: true

            - name: Generate checksums
              working-directory: artifacts
              run: sha256sum laufey-cef-* > SHA256SUMS

            - name: Publish backend release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  if ! gh release view "$CEF_BACKEND_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                    gh release create "$CEF_BACKEND_TAG" \
                      --repo "$GITHUB_REPOSITORY" \
                      --prerelease \
                      --title "CEF 150 backends for Deno Desktop" \
                      --notes "Laufey v$LAUFEY_VERSION (ABI 29) built against CEF $CEF_FULL_VERSION. All backends enable MiddleClickAutoscroll and OverlayScrollbar by default."
                  fi

                  gh release upload "$CEF_BACKEND_TAG" artifacts/* \
                    --repo "$GITHUB_REPOSITORY" \
                    --clobber
